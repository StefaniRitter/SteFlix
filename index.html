<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteFlix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
      <header>
        <h1>Quem está assistindo?</h1>
        <p>Selecione um perfil para continuar.</p>
      </header>

      <section aria-label="Perfis de usuário">
       <nav class="profiles">
            <a href="#" class="profile">
                <figure>
                    <img src="/assets/perfil1.jpg" alt="Avatar do Perfil 1">
                    <figcaption>Pedro</figcaption>
                </figure>
            </a>
            <a href="#" class="profile">
                <figure>
                    <img src="/assets/perfil2.jpg" alt="Avatar do Perfil 2">
                    <figcaption>Lúcia</figcaption>
                </figure>
            </a>
       </nav>
      </section>
    </main>
</body>
</html>
